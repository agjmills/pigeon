name = "pigeon"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Copy wrangler.toml to wrangler.local.toml and fill in your values.
# wrangler.local.toml is gitignored.
#
# [vars]
# OIDC_ISSUER = "https://auth.example.com/..."   # OIDC discovery base — must expose /.well-known/openid-configuration
# OIDC_CLIENT_ID = "pigeon"
# APP_URL = "https://pigeon.example.com"
#
# [[d1_databases]]
# binding = "DB"
# database_name = "pigeon"
# database_id = ""          # wrangler d1 create pigeon
#
# [[r2_buckets]]
# binding = "ATTACHMENTS"
# bucket_name = "pigeon-attachments"
#
# Secrets (never in toml — set via: wrangler secret put <NAME>):
#   OIDC_CLIENT_SECRET
#   RESEND_API_KEY
#   SESSION_SECRET       random 32-byte hex
